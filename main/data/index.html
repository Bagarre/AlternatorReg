<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alternator Regulator</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="title-wrap">
      <img src="/alternator-icon.png" alt="Alternator icon" class="icon" />
      <div>
        <h1>Alternator Regulator</h1>
        <p id="networkSummary">Loading network…</p>
      </div>
    </div>

    <label class="switch-wrap">
      <span id="enableStatusLabel">Disabled</span>
      <label class="switch">
        <input type="checkbox" id="enableToggle" />
        <span class="slider"></span>
      </label>
    </label>
  </header>

  <main class="layout">
    <section class="card">
      <div class="card-header">
        <h2>Status</h2>
        <div class="button-row">
          <button id="refreshBtn" class="secondary">Refresh</button>
          <button id="rebootBtn" class="danger">Reboot</button>
        </div>
      </div>

      <div class="kv-grid" id="statusGrid">
        <div>Voltage</div><div id="voltage">—</div>
        <div>Current</div><div id="current">—</div>
        <div>Field PWM</div><div id="field_pwm">—</div>
        <div>Requested PWM</div><div id="requested_pwm">—</div>
        <div>Alternator Temp</div><div id="alt_temp">—</div>
        <div>RPM</div><div id="rpm">—</div>
        <div>Stage</div><div id="stage">—</div>
        <div>CAN Status</div><div id="can_status">—</div>
        <div>Last CAN</div><div id="last_can">—</div>
        <div>BMS Permission</div><div id="bms_permission">—</div>
        <div>Field Enabled</div><div id="field_enabled">—</div>
        <div>Last Disable Reason</div><div id="last_disable_reason">—</div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Configuration</h2>
        <button id="saveConfig">Save</button>
      </div>

      <div class="form-grid">
        <label>
          <span>Target Voltage</span>
          <input type="number" step="0.1" id="targetVoltage" />
        </label>

        <label>
          <span>Current Limit</span>
          <input type="number" step="1" id="currentLimit" />
        </label>

        <label>
          <span>Float Voltage</span>
          <input type="number" step="0.1" id="floatVoltage" />
        </label>

        <label>
          <span>Derate Temp (°C)</span>
          <input type="number" step="0.1" id="derateTemp" />
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="canInput" />
          <span>Require CAN/RPM input</span>
        </label>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Network</h2>
        <div class="button-row">
          <button id="submitNetwork">Save & Reboot</button>
          <button id="resetNetwork" class="secondary">Reset Network</button>
        </div>
      </div>

      <div class="form-grid">
        <label>
          <span>Wi-Fi SSID</span>
          <input type="text" id="ssid" placeholder="Blank = fallback AP" />
        </label>

        <label>
          <span>Wi-Fi Password</span>
          <input type="password" id="password" />
        </label>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Logs</h2>
        <button id="refreshLogs" class="secondary">Refresh Logs</button>
      </div>
      <pre id="logOutput" class="log-box">Loading logs…</pre>
    </section>
  </main>

  <div id="toastRoot" class="toast-root"></div>
  <script src="/app.js"></script>
</body>
</html>
